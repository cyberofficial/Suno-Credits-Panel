<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Suno Credits</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 250px;
      padding: 16px;
    }
    h2 {
      margin-top: 0;
    }
    .credits {
      font-size: 24px;
      font-weight: bold;
      margin: 12px 0;
    }
    .usage {
      font-size: 14px;
      color: #666;
    }
    .refresh-btn {
      background: #4285f4;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 12px;
    }
    .refresh-btn:hover {
      background: #3367d6;
    }
    .error {
      color: #d93025;
      margin-top: 12px;
    }
    .loading {
      color: #5f6368;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h2>Suno Credits</h2>
  <div class="credits" id="credits">Loading...</div>
  <div class="usage" id="usage">Daily usage: -- / --</div>
  <button class="refresh-btn" id="refreshBtn">Refresh</button>
  <div id="error" class="error"></div>

  <script src="popup.js"></script>
</body>
</html>
